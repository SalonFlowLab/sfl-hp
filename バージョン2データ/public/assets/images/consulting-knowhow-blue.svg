<text x="226" y="356" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="22" fill="#31427f">媒体・LINE・記録・再来導線を少しずつ整えながら、</text>
<text x="226" y="392" font-family="'Hiragino Sans','Noto Sans JP',sans-serif" font-size="22" fill="#31427f">自分たちらしい運営の形へ育てていきます。</text>
